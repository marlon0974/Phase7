<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
      <meta content="KB" name="author"/>
      <title>Phase7 Rechner </title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
button {
    width: 100px;
    height: 100px;
    font-size: 30px;
	margin: 5px;
}
	.gross {
    width: 215px;
    height: 100px;
    font-size: 30px;
	margin: 5px;}
	
	.Start {width: 325px;
    height: 100px;
    font-size: 30px;
    text-align: center;
	margin: 5px;}
	
	#punkte {
    width: 325px;
    height: 100px;
    font-size: 50px;
    border: 2px solid black;
    text-align: center;
    line-height: 100px;
	}
	
	#liste {
    font-size: 25px;
}
</style>

	</head>
	<body>
	

	

	<button class="Start"onclick="window.location.href='index.html'">
    Zurück zur Startseite 
	</button>
	
	<p id="liste"></p>	
		
	<p id="punkte">0</p>
	
	<h2 id="aktueller"></h2>
	
	
 
	<button onclick="addiere(1)">1</button>
	<button onclick="addiere(2)">2</button>
	<button onclick="addiere(3)">3</button>
	<br><br>
	<button onclick="addiere(4)">4</button>
	<button onclick="addiere(5)">5</button>
	<button onclick="addiere(6)">6</button>
	<br><br>
	<button onclick="addiere(7)">7</button>
	<button onclick="addiere(8)">8</button>
	<button onclick="addiere(9)">9</button>
	<br><br>
	<button onclick="addiere(0)">0</button>
	<button onclick="fertig()">fertig</button>
	<button onclick="subtrahiere()">Zurück</button>
	
	
	

	<script>
	
	let anzahl = prompt("Wie viele Spieler?");

		let spieler = [];
		let spielerpunkte = [];
	let aktuellerSpieler = 0;
	let eingabe = "";


	for(let i = 0; i < anzahl; i++) {

    spieler[i] = prompt("Name von Spieler " + (i+1));
    spielerpunkte[i] = 0;

}

alert(spieler);

let text = "";

for(let i = 0; i < spieler.length; i++) {
    text += spieler[i] + ": " + spielerpunkte[i] +  "<br>";
}
document.getElementById("liste").innerHTML = text;
aktualisieren();


document.getElementById("aktueller").innerHTML =
    "Aktuell: " + spieler[aktuellerSpieler];




	
	
	
		let punkte = 0;
	
		
		function addiere(wert) {
			 eingabe = eingabe + wert;
			 punkte = eingabe;
			document.getElementById("punkte").innerHTML = eingabe;
		}	
		function subtrahiere() {

    eingabe = eingabe.slice(0, -1);

    if(eingabe == "") {
        document.getElementById("punkte").innerHTML = "0";
    } else {
        document.getElementById("punkte").innerHTML = eingabe;
    }
}
		
		function fertig() {

    spielerpunkte[aktuellerSpieler] =
        spielerpunkte[aktuellerSpieler] + Number(eingabe);

    eingabe = "";

    aktuellerSpieler++;

    if (aktuellerSpieler >= spieler.length) {
        aktuellerSpieler = 0;
    }

    document.getElementById("punkte").innerHTML = "0";

    aktualisieren();
}
	
	function aktualisieren() {

    let text = "";

    for(let i = 0; i < spieler.length; i++) {

        text += spieler[i] +
                ": " +
                spielerpunkte[i] +
                "<br>";
    }

    document.getElementById("liste").innerHTML = text;

    document.getElementById("aktueller").innerHTML =
        "Aktuell: " + spieler[aktuellerSpieler];
}
	</script>				
	</body>
</html>
